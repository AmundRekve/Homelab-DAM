# =========================================
# Namespace
# =========================================
apiVersion: v1
kind: Namespace
metadata:
  name: homepage

---
# =========================================
# Deployment
# =========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: copy-config
          image: busybox
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command: ['sh', '-c', 'cp /config-source/*.yaml /app/config/']
          volumeMounts:
            - name: config
              mountPath: /config-source
              readOnly: true
            - name: config-writable
              mountPath: /app/config
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          imagePullPolicy: Always
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "192.168.0.242:32036"
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: config-writable
              mountPath: /app/config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          projected:
            sources:
              - configMap:
                  name: homepage-settings
              - configMap:
                  name: homepage-content
        - name: config-writable
          emptyDir: {}

---
# =========================================
# Service
# =========================================
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: homepage
  labels:
    app: homepage
spec:
  type: ClusterIP
  selector:
    app: homepage
  ports:
    - name: http
      port: 3000
      targetPort: http

---
# =========================================
# Ingress
# =========================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage
  namespace: homepage
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homepage
                port:
                  number: 3000
