apiVersion: v1
kind: Namespace
metadata:
  name: splunk
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: splunk-etc-pvc
  namespace: splunk
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: splunk-var-pvc
  namespace: splunk
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 50Gi
