apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: wger
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: wger
spec:
  selector:
    app: redis
  ports:
    - port: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: wger
  namespace: wger
spec:
  selector:
    app: wger
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
